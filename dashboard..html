<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhantomImmune AI | Security Operations Center</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0a0e1a; --bg-secondary: #111827; --bg-card: #1a1f2e;
      --accent-cyan: #00d4ff; --accent-green: #00ff88; --accent-red: #ff3860;
      --accent-yellow: #ffd700; --accent-purple: #b829dd;
      --text-primary: #e5e7eb; --text-secondary: #9ca3af; --border: #2d3748;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none; z-index: -1;
    }
    .header {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
      border-bottom: 2px solid var(--accent-cyan); padding: 20px 40px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 20px rgba(0,212,255,0.2);
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .brand-icon {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 0 20px rgba(0,212,255,0.4);
    }
    .brand h1 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand span { font-size: 0.85rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
    .status-badge {
      padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace;
    }
    .status-badge.connected {
      background: rgba(0,255,136,0.15); color: var(--accent-green);
      border: 1px solid var(--accent-green); box-shadow: 0 0 15px rgba(0,255,136,0.3);
    }
    .status-badge.disconnected {
      background: rgba(255,56,96,0.15); color: var(--accent-red);
      border: 1px solid var(--accent-red);
    }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.2)} }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 30px 40px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 25px; position: relative; overflow: hidden; transition: all 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
    }
    .stat-card.attack::before { background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow)); }
    .stat-card.honeypot::before { background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red)); }
    .stat-card.immunity::before { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }
    .stat-card.blockchain::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .stat-value { font-size: 2.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--accent-cyan); }
    .stat-card.attack .stat-value { color: var(--accent-red); }
    .stat-card.honeypot .stat-value { color: var(--accent-yellow); }
    .stat-card.immunity .stat-value { color: var(--accent-green); }
    .stat-card.blockchain .stat-value { color: var(--accent-purple); }
    
    .main-content { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 0 40px 40px; }
    .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--accent-cyan); }
    .logs-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .logs-header { background: var(--bg-secondary); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .logs-list { max-height: 600px; overflow-y: auto; padding: 10px; }
    .log-entry {
      padding: 15px 20px; margin: 8px 0; background: var(--bg-secondary);
      border-radius: 8px; border-left: 4px solid var(--border);
      display: flex; align-items: flex-start; gap: 15px; animation: slideIn 0.3s ease; transition: all 0.2s ease;
    }
    .log-entry:hover { transform: translateX(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    @keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
    .log-entry.attack { border-left-color: var(--accent-red); background: rgba(255,56,96,0.05); }
    .log-entry.honeypot { border-left-color: var(--accent-yellow); background: rgba(255,215,0,0.05); }
    .log-entry.immunity { border-left-color: var(--accent-green); background: rgba(0,255,136,0.05); }
    .log-entry.blockchain { border-left-color: var(--accent-purple); background: rgba(184,41,221,0.05); }
    .log-entry.system { border-left-color: var(--accent-cyan); }
    .log-icon { font-size: 1.5rem; flex-shrink: 0; }
    .log-content { flex: 1; min-width: 0; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .log-type { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .log-time { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-secondary); }
    .log-ip { font-family: 'JetBrains Mono', monospace; color: var(--accent-cyan); font-weight: 600; font-size: 0.9rem; }
    .log-message { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state-icon { font-size: 4rem; margin-bottom: 15px; opacity: 0.5; }
    .logs-list::-webkit-scrollbar { width: 8px; }
    .logs-list::-webkit-scrollbar-track { background: var(--bg-secondary); }
    .logs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .logs-list::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
    @media (max-width: 768px) {
      .header { padding: 15px 20px; } .brand h1 { font-size: 1.3rem; }
      .stats-grid { padding: 20px; } .main-content { padding: 0 20px 20px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div><h1>PhantomImmune AI</h1><span>Security Operations Center</span></div>
    </div>
    <div id="statusBadge" class="status-badge disconnected"><span class="pulse"></span><span>Disconnected</span></div>
  </header>
  
  <div class="stats-grid">
    <div class="stat-card attack"><div class="stat-label">⚠️ Attacks Detected</div><div class="stat-value" id="attackCount">0</div></div>
    <div class="stat-card honeypot"><div class="stat-label">🎭 Honeypot Triggers</div><div class="stat-value" id="honeypotCount">0</div></div>
    <div class="stat-card immunity"><div class="stat-label">🧬 Immunity Rules</div><div class="stat-value" id="immunityCount">0</div></div>
    <div class="stat-card blockchain"><div class="stat-label">🔗 Blockchain Blocks</div><div class="stat-value" id="blockchainCount">0</div></div>
  </div>
  
  <div class="main-content">
    <div class="logs-container">
      <div class="logs-header">
        <div class="section-title"><span>📡</span><span>Real-Time Event Stream</span></div>
        <span style="font-size:0.85rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace">LIVE</span>
      </div>
      <div class="logs-list" id="logsList">
        <div class="empty-state"><div class="empty-state-icon">📡</div><div style="font-size:1.2rem;font-weight:600;margin-bottom:10px">Waiting for events...</div><div style="font-size:0.9rem">Events will appear here in real-time</div></div>
      </div>
    </div>
  </div>

  <script>
    const socket = io('http://10.68.101.105:5000', { reconnection: true, reconnectionAttempts: 10, reconnectionDelay: 1000 });
    const counters = { attack: 0, honeypot: 0, immunity: 0, blockchain: 0 };
    const statusBadge = document.getElementById('statusBadge');
    const logsList = document.getElementById('logsList');
    
    function updateStatus(connected) {
      if (connected) {
        statusBadge.className = 'status-badge connected';
        statusBadge.innerHTML = '<span class="pulse"></span><span>Connected</span>';
      } else {
        statusBadge.className = 'status-badge disconnected';
        statusBadge.innerHTML = '<span class="pulse"></span><span>Disconnected</span>';
      }
    }
    function incrementCounter(type) { counters[type]++; document.getElementById(type+'Count').textContent = counters[type]; }
    function addLog(type, data) {
      const empty = logsList.querySelector('.empty-state'); if (empty) empty.remove();
      const entry = document.createElement('div'); entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const icons = { attack_detected:'⚠️', honeypot_triggered:'🎭', immunity_generated:'🧬', blockchain_updated:'🔗', blocked:'🚫', connected:'✅', disconnected:'❌' };
      const labels = { attack_detected:'Attack Detected', honeypot_triggered:'Honeypot Triggered', immunity_generated:'Immunity Generated', blockchain_updated:'Blockchain Updated', blocked:'IP Blocked', connected:'Connected', disconnected:'Disconnected' };
      entry.innerHTML = `<div class="log-icon">${icons[type]||'📝'}</div><div class="log-content"><div class="log-header"><span class="log-type">${labels[type]||type}</span><span class="log-time">${time}</span></div><div class="log-ip">${data.ip}</div><div class="log-message">${data.message}</div></div>`;
      logsList.insertBefore(entry, logsList.firstChild);
      while (logsList.children.length > 50) logsList.removeChild(logsList.lastChild);
    }
    socket.on('connect', () => { updateStatus(true); addLog('connected', {ip:'system', message:'Dashboard connected to PhantomImmune AI server'}); });
    socket.on('disconnect', () => { updateStatus(false); addLog('disconnected', {ip:'system', message:'Lost connection to server'}); });
    socket.on('connect_error', () => updateStatus(false));
    socket.on('reconnect', (n) => { updateStatus(true); addLog('connected', {ip:'system', message:`Reconnected after ${n} attempts`}); });
    socket.on('attack_detected', data => { incrementCounter('attack'); addLog('attack_detected', data); });
    socket.on('honeypot_triggered', data => { incrementCounter('honeypot'); addLog('honeypot_triggered', data); });
    socket.on('immunity_generated', data => { incrementCounter('immunity'); addLog('immunity_generated', data); });
    socket.on('blockchain_updated', data => { incrementCounter('blockchain'); addLog('blockchain_updated', data); });
  </script>
</body>
</html>
